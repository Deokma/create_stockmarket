modLoader    = "javafml"
loaderVersion = "[4,)"
license      = "${mod_license}"

[[mods]]
modId       = "${mod_id}"
version     = "${mod_version}"
displayName = "${mod_name}"
description = '''${mod_description}'''
authors     = "${mod_authors}"

# ── Dependencies ─────────────────────────────────────────────────────────────

[[dependencies.${mod_id}]]
    modId        = "neoforge"
    type         = "required"
    versionRange = "[21.1.206,)"
    ordering     = "NONE"
    side         = "BOTH"

[[dependencies.${mod_id}]]
    modId        = "minecraft"
    type         = "required"
    versionRange = "[1.21.1,1.22)"
    ordering     = "NONE"
    side         = "BOTH"

[[dependencies.${mod_id}]]
    modId        = "create"
    type         = "required"
    versionRange = "[6.0.9,6.1.0)"
    ordering     = "BEFORE"
    side         = "BOTH"

[[dependencies.${mod_id}]]
    modId        = "numismatics"
    type         = "optional"
    versionRange = "[1.0.19,)"
    ordering     = "BEFORE"
    side         = "BOTH"
